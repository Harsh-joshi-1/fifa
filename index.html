<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Football Streams</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.item{
    padding:12px;
    border:1px solid #333;
    margin-bottom:8px;
    cursor:pointer;
}

button{
    padding:10px;
    margin-bottom:15px;
}

iframe{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
<body>

<div id="app">Loading football streams...</div>

<script>
var API_URL = "https://dami-tv.pro/papi/api/streams";
var footballStreams = [];

function loadStreams() {

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function() {

        if (xhr.readyState !== 4) {
            return;
        }

        if (xhr.status !== 200) {
            document.getElementById("app").innerHTML =
                "Failed to load API<br>Status: " + xhr.status;
            return;
        }

        try {

            var data = JSON.parse(xhr.responseText);

            var footballCategory = null;

            for (var i = 0; i < data.streams.length; i++) {

                if (
                    data.streams[i].category &&
                    data.streams[i].category.toLowerCase() === "football"
                ) {
                    footballCategory = data.streams[i];
                    break;
                }
            }

            if (!footballCategory) {
                document.getElementById("app").innerHTML =
                    "Football category not found";
                return;
            }

            footballStreams = footballCategory.streams;
            showMatches();

        } catch (e) {

            document.getElementById("app").innerHTML =
                "JSON Error: " + e.message;
        }
    };

    xhr.open("GET", API_URL, true);
    xhr.send();
}

function showMatches() {

    var html = "<h2>Football Streams</h2>";

    for (var i = 0; i < footballStreams.length; i++) {

        html +=
            '<div class="item" onclick="showSources(' + i + ')">' +
            footballStreams[i].name +
            ' [' + footballStreams[i].status + ']' +
            '</div>';
    }

    document.getElementById("app").innerHTML = html;
}

function showSources(index) {

    var match = footballStreams[index];

    var html =
        '<button onclick="showMatches()">Back</button>' +
        '<h2>' + match.name + '</h2>';

    if (!match.sources || match.sources.length === 0) {

        html += '<div>No sources available</div>';

    } else {

        for (var i = 0; i < match.sources.length; i++) {

            var source = match.sources[i];

            var url = source.embed;

            html +=
                '<div class="item" onclick="openStream(\'' +
                url +
                '\')">' +
                (source.source || ('Source ' + (i + 1))) +
                '</div>';
        }
    }

    document.getElementById("app").innerHTML = html;
}

function openStream(url) {

    document.body.innerHTML =
        '<iframe src="' +
        url +
        '" allowfullscreen></iframe>';
}

loadStreams();
</script>

</body>
</html>
