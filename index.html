<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Football Streams</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

.item{
    padding:12px;
    border:1px solid #333;
    margin-bottom:10px;
}

a{
    color:#00ff00;
    text-decoration:none;
}

.url{
    color:#aaa;
    font-size:12px;
    word-break:break-all;
    margin-top:5px;
}

button{
    padding:10px;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div id="app">Loading football streams...</div>

<script>

var API_URL = "https://dami-tv.pro/papi/api/streams";
var footballStreams = [];

function loadStreams(){

    var xhr = new XMLHttpRequest();

    xhr.onreadystatechange = function(){

        if(xhr.readyState !== 4){
            return;
        }

        if(xhr.status !== 200){
            document.getElementById("app").innerHTML =
                "API Error<br>Status: " + xhr.status;
            return;
        }

        try{

            var data = JSON.parse(xhr.responseText);

            var footballCategory = null;

            for(var i=0;i<data.streams.length;i++){

                if(
                    data.streams[i].category &&
                    data.streams[i].category.toLowerCase() === "football"
                ){
                    footballCategory = data.streams[i];
                    break;
                }
            }

            if(!footballCategory){
                document.getElementById("app").innerHTML =
                    "Football category not found";
                return;
            }

            footballStreams = footballCategory.streams;

            showMatches();

        }catch(e){

            document.getElementById("app").innerHTML =
                "JSON Error<br>" + e.message;
        }
    };

    xhr.open("GET", API_URL, true);
    xhr.send();
}

function showMatches(){

    var html = "<h2>Football Streams</h2>";

    for(var i=0;i<footballStreams.length;i++){

        html +=
            '<div class="item">' +
            '<a href="#" onclick="showSources(' + i + ');return false;">' +
            footballStreams[i].name +
            ' [' + footballStreams[i].status + ']' +
            '</a>' +
            '</div>';
    }

    document.getElementById("app").innerHTML = html;
}

function showSources(index){

    var match = footballStreams[index];

    var html =
        '<button onclick="showMatches()">Back</button>' +
        '<h2>' + match.name + '</h2>';

    if(match.sources && match.sources.length){

        html += "<h3>Sources</h3>";

        for(var i=0;i<match.sources.length;i++){

            var source = match.sources[i];

            html +=
                '<div class="item">' +
                '<strong>' + (source.source || ('Source ' + (i+1))) + '</strong>' +
                '<div class="url">' + source.embed + '</div>' +
                '<br>' +
                '<a href="' + source.embed + '">Open Source</a>' +
                '</div>';
        }
    }

    if(match.iframe){

        html +=
            '<h3>Main Stream</h3>' +
            '<div class="item">' +
            '<div class="url">' + match.iframe + '</div>' +
            '<br>' +
            '<a href="' + match.iframe + '">Open Main Stream</a>' +
            '</div>';
    }

    document.getElementById("app").innerHTML = html;
}

loadStreams();

</script>

</body>
</html>
